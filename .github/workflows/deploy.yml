name: Deploy API

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'web/**'
      - '*.md'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl deploy --remote-only -a gradient-api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

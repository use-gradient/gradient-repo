app = "gradient-api"
primary_region = "ewr"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "6767"
  ENV = "production"
  LOG_LEVEL = "info"
  NATS_URL = "nats://gradient-nats.internal:4222"
  STRIPE_CREDIT_METER_EVENT_NAME = "gradient_credits"
  STRIPE_CREDIT_METER_CUSTOMER_KEY = "stripe_customer_id"
  STRIPE_CREDIT_METER_VALUE_KEY = "credits"
  FREE_TRIAL_CREDIT_USD = "10"
  EMBEDDING_PROVIDER = "openai"
  OPENAI_EMBEDDING_MODEL = "text-embedding-3-small"
  OPENAI_EMBEDDING_BASE_URL = "https://api.openai.com/v1"
  OPENAI_EMBEDDING_DIMENSIONS = "1536"
  WARM_POOL_DEFAULT_SIZE = "0"
  WARM_POOL_MAX_SIZE = "0"

[http_service]
  internal_port = 6767
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/api/v1/health"

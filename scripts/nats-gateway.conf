# NATS Server Configuration for Gradient v0.1
# Single-region, single-node. No gateway, no cluster.
#
# Usage:
#   nats-server -c nats-gateway.conf
#
# v0.2: Add multi-region gateway configuration when needed.

# Server identity
server_name: gradient-nats

# Client connections
listen: 0.0.0.0:4222

# JetStream (required for Live Context Mesh persistence)
jetstream {
    store_dir: /data/nats/jetstream
    max_mem_store: 256MB
    max_file_store: 2GB
}

# Authentication
authorization {
    token: $NATS_AUTH_TOKEN
}

# v0.2: Multi-region gateway (uncomment when scaling to multiple regions)
# gateway {
#     name: gradient-$REGION
#     listen: 0.0.0.0:7222
#     gateways: [
#         { name: gradient-fsn1, urls: ["nats://nats-gw.fsn1.gradient.internal:7222"] }
#         { name: gradient-nbg1, urls: ["nats://nats-gw.nbg1.gradient.internal:7222"] }
#     ]
# }

# Logging
log_file: /var/log/nats/nats-server.log
logtime: true
debug: false
trace: false

# Monitoring
http_port: 8222

# Limits
max_connections: 10000
max_payload: 1MB
max_control_line: 4KB
write_deadline: 10s
